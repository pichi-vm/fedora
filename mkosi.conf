#
# Truly-minimal Fedora base for the pichi ecosystem.
#
# Output is a rootfs *directory*; CI packs it into a bare ext4 image and
# `carapace import`s it into a carapace OCI artifact pushed to ghcr.io. This is
# a pure distro base — no pichi/corium content; corium is layered as a separate
# scute at `pichi build` time, so this repo has no pichi dependency.

[Distribution]
Distribution=fedora
Release=43

[Output]
Format=directory
Output=rootfs

[Content]
# No kernel/bootloader: a carapace base is a read-only rootfs, not a bootable
# disk. Just enough to be a usable `from:` (a shell, coreutils, and dnf so
# `carapace.yaml`/`pmi.yaml` `run:` directives can install more at build time).
Bootable=no
Packages=
        filesystem
        bash
        coreutils
        dnf
        glibc-minimal-langpack
        ca-certificates
